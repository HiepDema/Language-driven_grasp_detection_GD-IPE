# Quick test config - validate model works in ~5 minutes
# Usage: python train.py --config configs/quick_test.yaml

model:
  name: "grasp_clip"
  image_size: 416
  clip_model: "openai/clip-vit-base-patch16"
  freeze_clip: true  # freeze CLIP to speed up training
  freeze_clip_epochs: 999
  grasp_head_hidden: 512
  dropout: 0.1

training:
  batch_size: 8
  num_epochs: 3
  lr: 5.0e-4  # higher lr for fast convergence test
  weight_decay: 1.0e-4
  lr_scheduler: "cosine"
  warmup_epochs: 0
  clip_grad_norm: 1.0
  val_split: 0.15
  test_split: 0.15
  num_workers: 0  # 0 = no multiprocessing, avoids issues on Windows
  seed: 42
  mixed_precision: true

loss:
  xy_weight: 1.0
  wh_weight: 1.0
  angle_weight: 1.0
  smooth_l1_beta: 0.5

data:
  data_dir: "./data"
  image_size: 416
  load_images: true
  augmentation: false

checkpoint:
  save_dir: "./checkpoints/quick"
  save_every: 1
  keep_top_k: 1
  resume: null

eval:
  iou_threshold: 0.25
  angle_threshold: 30
