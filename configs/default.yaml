# Grasp-Anything Configuration

model:
  name: "grasp_detection"
  image_size: 416
  d_model: 512
  max_seq_len: 128
  bert_model: "bert-base-uncased"

training:
  batch_size: 32
  num_epochs: 50
  lr: 1.0e-4
  weight_decay: 1.0e-4
  lr_scheduler: "cosine"
  warmup_epochs: 3
  clip_grad_norm: 1.0
  val_split: 0.15
  test_split: 0.15
  num_workers: 4
  seed: 42
  mixed_precision: true

loss:
  center_weight: 1.0
  size_weight: 1.0
  angle_weight: 1.0
  smooth_l1_beta: 0.5

data:
  data_dir: "./data"
  image_size: 416
  load_images: true
  augmentation: true

checkpoint:
  save_dir: "./checkpoints"
  save_every: 5
  keep_top_k: 3
  resume: null

eval:
  iou_threshold: 0.25
  angle_threshold: 30
